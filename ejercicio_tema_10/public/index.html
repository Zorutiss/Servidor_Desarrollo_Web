<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp — Entrar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p { color: #888; font-size: 14px; margin-top: 4px; }

    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      background: #e94560;
      color: white;
    }

    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #e94560; }
    input::placeholder { color: #555; }

    button[type="submit"] {
      padding: 13px;
      background: linear-gradient(135deg, #e94560, #c73652);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button[type="submit"]:hover { opacity: 0.9; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }

    .error {
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.3);
      color: #e94560;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="icon">💬</span>
      <h1>ChatApp</h1>
      <p>Mensajería en tiempo real</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Iniciar sesión</button>
      <button class="tab" onclick="showTab('register')">Registrarse</button>
    </div>

    <div id="error" class="error"></div>

    <!-- LOGIN -->
    <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
      <input type="email" id="loginEmail" placeholder="Email" required />
      <input type="password" id="loginPassword" placeholder="Contraseña" required />
      <button type="submit">Entrar al chat →</button>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" class="form" onsubmit="handleRegister(event)">
      <input type="text" id="regUsername" placeholder="Nombre de usuario" required />
      <input type="email" id="regEmail" placeholder="Email" required />
      <input type="password" id="regPassword" placeholder="Contraseña (mín. 8 chars)" required />
      <button type="submit">Crear cuenta →</button>
    </form>
  </div>

  <script>
    // Si ya hay token, ir al chat
    if (localStorage.getItem('token')) window.location.href = '/chat';

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('registerForm').classList.toggle('active', tab === 'register');
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError() {
      document.getElementById('error').classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) return showError(data.message);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/chat';
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError();
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();

      if (!res.ok) return showError(data.message);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/chat';
    }
  </script>
</body>
</html>
