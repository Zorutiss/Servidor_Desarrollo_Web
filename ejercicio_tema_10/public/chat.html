<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatApp</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --sidebar: #161b22;
      --surface: #1c2128;
      --border: #30363d;
      --accent: #e94560;
      --accent2: #58a6ff;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    body {
      height: 100vh;
      display: flex;
      background: var(--bg);
      font-family: 'Segoe UI', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-header .app-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .user-info {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c73652);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }

    .user-name { font-size: 14px; font-weight: 600; }

    .logout-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--accent); }

    .section-title {
      padding: 12px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .add-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
    }
    .add-btn:hover { color: var(--accent2); }

    .room-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    .room-item {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
      font-size: 14px;
    }

    .room-item:hover { background: rgba(255,255,255,0.05); }
    .room-item.active { background: rgba(233,69,96,0.15); color: var(--accent); }

    .room-hash { color: var(--muted); font-size: 16px; }

    .online-section {
      padding: 8px;
      border-top: 1px solid var(--border);
      max-height: 180px;
      overflow-y: auto;
    }

    .online-user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      font-size: 13px;
      color: var(--muted);
      border-radius: 6px;
    }

    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
    }

    /* ── MAIN CHAT ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header h2 { font-size: 16px; font-weight: 600; }
    .chat-header .desc { font-size: 13px; color: var(--muted); margin-left: auto; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .message .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #58a6ff, #1f6feb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.own .msg-avatar {
      background: linear-gradient(135deg, var(--accent), #c73652);
    }

    .msg-body { flex: 1; min-width: 0; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }

    .msg-username { font-size: 14px; font-weight: 600; }
    .message.own .msg-username { color: var(--accent); }

    .msg-time { font-size: 11px; color: var(--muted); }

    .msg-content {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
    }

    .system-msg {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0;
    }

    .typing-indicator {
      padding: 4px 20px 8px;
      font-size: 12px;
      color: var(--muted);
      min-height: 24px;
      font-style: italic;
    }

    /* ── INPUT ── */
    .input-area {
      padding: 12px 20px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      gap: 10px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--accent2); }

    .input-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }

    .input-wrap input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }

    .no-room {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
    }

    .no-room .big-icon { font-size: 64px; }
    .no-room h3 { font-size: 18px; color: var(--text); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h3 { font-size: 18px; }

    .modal input, .modal textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      font-family: inherit;
      resize: none;
    }

    .modal input:focus, .modal textarea:focus { border-color: var(--accent2); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <span>💬</span>
    <span class="app-name">ChatApp</span>
  </div>

  <div class="user-info">
    <div class="avatar" id="userAvatar">?</div>
    <span class="user-name" id="userName">Cargando...</span>
    <button class="logout-btn" onclick="logout()" title="Cerrar sesión">⏻</button>
  </div>

  <div class="section-title">
    Salas
    <button class="add-btn" onclick="showModal()" title="Crear sala">＋</button>
  </div>

  <div class="room-list" id="roomList">
    <div style="padding:12px;color:var(--muted);font-size:13px;">Cargando salas...</div>
  </div>

  <div class="online-section">
    <div class="section-title" style="padding:4px 8px 6px;">Online</div>
    <div id="onlineUsers"></div>
  </div>
</div>

<!-- CHAT AREA -->
<div class="chat-area">
  <div id="noRoom" class="no-room">
    <span class="big-icon">👈</span>
    <h3>Selecciona una sala</h3>
    <p>Elige una sala del menú o crea una nueva</p>
  </div>

  <div id="chatContent" style="display:none;flex:1;display:none;flex-direction:column;">
    <div class="chat-header">
      <span style="color:var(--muted);font-size:18px;">#</span>
      <h2 id="roomName">sala</h2>
      <span class="desc" id="roomDesc"></span>
    </div>

    <div class="messages" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>

    <div class="input-area">
      <div class="input-wrap">
        <input
          type="text"
          id="messageInput"
          placeholder="Escribe un mensaje..."
          onkeydown="handleKey(event)"
          oninput="handleTyping()"
          autocomplete="off"
        />
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CREAR SALA -->
<div class="modal-overlay" id="modalOverlay" onclick="hideModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>🏠 Nueva sala</h3>
    <input type="text" id="roomNameInput" placeholder="Nombre de la sala" />
    <textarea id="roomDescInput" placeholder="Descripción (opcional)" rows="3"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="hideModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="createRoom()">Crear sala</button>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (!token || !user) window.location.href = '/';

  let socket;
  let currentRoom = null;
  let typingTimer;
  const onlineUsers = new Set();
  const typingUsers = new Map(); // roomId → Set of usernames

  // ── INIT ──
  function init() {
    document.getElementById('userName').textContent = user.username;
    document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();

    socket = io({ auth: { token } });
    bindSocketEvents();
    loadRooms();
  }

  // ── SOCKET EVENTS ──
  function bindSocketEvents() {
    socket.on('connect', () => console.log('🟢 Socket conectado'));
    socket.on('connect_error', (e) => {
      console.error('Socket error:', e.message);
      if (e.message.includes('Token')) logout();
    });

    socket.on('room:joined', ({ room, messages, users }) => {
      currentRoom = room;
      document.getElementById('roomName').textContent = room.name;
      document.getElementById('roomDesc').textContent = room.description || '';
      document.getElementById('noRoom').style.display = 'none';
      document.getElementById('chatContent').style.display = 'flex';
      document.getElementById('chatContent').style.flexDirection = 'column';

      renderMessages(messages);
      scrollToBottom();
    });

    socket.on('room:user-joined', ({ user: u }) => {
      appendSystemMsg(`${u.username} se unió a la sala`);
    });

    socket.on('room:user-left', ({ user: u }) => {
      appendSystemMsg(`${u.username} salió de la sala`);
    });

    socket.on('chat:message', (msg) => {
      appendMessage(msg);
      scrollToBottom();
    });

    socket.on('chat:typing', ({ user: u, roomId }) => {
      if (roomId !== currentRoom?._id) return;
      if (!typingUsers.has(roomId)) typingUsers.set(roomId, new Set());
      typingUsers.get(roomId).add(u.username);
      updateTypingIndicator();
    });

    socket.on('chat:stop-typing', ({ user: u, roomId }) => {
      typingUsers.get(roomId)?.delete(u.username);
      updateTypingIndicator();
    });

    socket.on('user:online', ({ userId, username }) => {
      onlineUsers.add(username);
      renderOnlineUsers();
    });

    socket.on('user:offline', ({ userId, username }) => {
      onlineUsers.delete(username);
      renderOnlineUsers();
    });
  }

  // ── ROOMS ──
  async function loadRooms() {
    const res = await fetch('/api/rooms', { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    renderRooms(data.rooms || []);
  }

  function renderRooms(rooms) {
    const list = document.getElementById('roomList');
    if (!rooms.length) {
      list.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:13px;">No hay salas. ¡Crea una!</div>';
      return;
    }
    list.innerHTML = rooms.map(r => `
      <div class="room-item ${currentRoom?._id === r._id ? 'active' : ''}" onclick="joinRoom('${r._id}', '${r.name}')">
        <span class="room-hash">#</span>
        <span>${r.name}</span>
      </div>
    `).join('');
  }

  function joinRoom(roomId, roomName) {
    if (currentRoom?._id === roomId) return;
    if (currentRoom) socket.emit('room:leave', { roomId: currentRoom._id });
    document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
    event.currentTarget?.classList.add('active');
    socket.emit('room:join', { roomId });
    document.getElementById('messages').innerHTML = '';
    document.getElementById('typingIndicator').textContent = '';
  }

  async function createRoom() {
    const name = document.getElementById('roomNameInput').value.trim();
    const description = document.getElementById('roomDescInput').value.trim();
    if (!name) return;

    const res = await fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name, description }),
    });
    const data = await res.json();
    if (!res.ok) return alert(data.message);

    hideModal();
    document.getElementById('roomNameInput').value = '';
    document.getElementById('roomDescInput').value = '';
    await loadRooms();
    joinRoom(data.room._id, data.room.name);
  }

  // ── MESSAGES ──
  function renderMessages(messages) {
    const container = document.getElementById('messages');
    container.innerHTML = '';
    messages.forEach(appendMessage);
  }

  function appendMessage(msg) {
    const container = document.getElementById('messages');
    const isOwn = msg.user._id === user._id || msg.user._id?.toString() === user._id;
    const time = new Date(msg.timestamp || msg.createdAt).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
    const initial = msg.user.username?.[0]?.toUpperCase() || '?';

    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'own' : ''}`;
    div.innerHTML = `
      <div class="msg-avatar">${initial}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-username">${msg.user.username}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-content">${escapeHtml(msg.content)}</div>
      </div>
    `;
    container.appendChild(div);

    // Limpiar typing de este usuario
    if (currentRoom) {
      typingUsers.get(currentRoom._id)?.delete(msg.user.username);
      updateTypingIndicator();
    }
  }

  function appendSystemMsg(text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    container.appendChild(div);
    scrollToBottom();
  }

  function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !currentRoom) return;

    socket.emit('chat:message', { roomId: currentRoom._id, content });
    input.value = '';
    clearTimeout(typingTimer);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function handleTyping() {
    if (!currentRoom) return;
    socket.emit('chat:typing', { roomId: currentRoom._id });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {}, 3000);
  }

  function updateTypingIndicator() {
    const indicator = document.getElementById('typingIndicator');
    if (!currentRoom) return;
    const users = [...(typingUsers.get(currentRoom._id) || [])].filter(u => u !== user.username);
    if (!users.length) { indicator.textContent = ''; return; }
    if (users.length === 1) indicator.textContent = `${users[0]} está escribiendo...`;
    else indicator.textContent = `${users.join(', ')} están escribiendo...`;
  }

  // ── ONLINE USERS ──
  function renderOnlineUsers() {
    const container = document.getElementById('onlineUsers');
    if (!onlineUsers.size) {
      container.innerHTML = '<div class="online-user" style="font-size:12px;">Nadie online aún</div>';
      return;
    }
    container.innerHTML = [...onlineUsers].map(u => `
      <div class="online-user">
        <span class="online-dot"></span>
        <span>${u}</span>
      </div>
    `).join('');
  }

  // ── MODAL ──
  function showModal() { document.getElementById('modalOverlay').classList.add('show'); }
  function hideModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('show');
    }
  }

  // ── UTILS ──
  function scrollToBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/';
  }

  init();
</script>
</body>
</html>
